name: Test Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/test_frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/test_frontend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/app/package-lock.json
      - name: Install dependencies
        working-directory: frontend/app
        run: npm install
      - name: Run tests
        working-directory: frontend/app
        run: npm run test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/app/package-lock.json
      - name: Install dependencies
        working-directory: frontend/app
        run: npm install
      - name: Run lint
        working-directory: frontend/app
        run: npm run lint

