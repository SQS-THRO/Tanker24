name: Test Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/test_frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/test_frontend.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/app/package-lock.json
      - name: Install dependencies
        working-directory: frontend/app
        run: npm install
      - name: Run lint
        working-directory: frontend/app
        run: npx prettier --check . && npx eslint .

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/app/package-lock.json
      - name: Install dependencies
        working-directory: frontend/app
        run: npm install
      - name: Run tests
        working-directory: frontend/app
        run: npx vitest --run
  
  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/app/package-lock.json
      - name: Install dependencies
        working-directory: frontend/app
        run: npm install
      - name: Install Playwright browsers
        working-directory: frontend/app
        run: npx playwright install chromium
      - name: Run tests
        working-directory: frontend/app
        run: npx playwright test